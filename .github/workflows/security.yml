name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security audit every Monday at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  security-audit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Generate audit report
      run: npm audit --json > audit-report-${{ matrix.node-version }}.json
      continue-on-error: true

    - name: Upload audit report
      uses: actions/upload-artifact@v3
      with:
        name: security-audit-report-${{ matrix.node-version }}
        path: audit-report-${{ matrix.node-version }}.json
        retention-days: 30

    - name: Check for critical vulnerabilities
      run: |
        if npm audit --audit-level=critical --json | jq -e '.metadata.vulnerabilities.critical > 0' > /dev/null 2>&1; then
          echo "❌ Critical vulnerabilities found!"
          npm audit --audit-level=critical
          exit 1
        else
          echo "✅ No critical vulnerabilities found"
        fi

    - name: Install Trivy
      run: |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy

    - name: Build Docker images
      run: |
        docker compose build radiocalico-prod

    - name: Scan Docker images with Trivy
      run: |
        echo "Scanning production image..."
        trivy image --severity HIGH,CRITICAL --format json --output trivy-prod-${{ matrix.node-version }}.json radiocalico-radiocalico-prod:latest
        trivy image --severity HIGH,CRITICAL radiocalico-radiocalico-prod:latest

        echo "Scanning base images..."
        trivy image --severity HIGH,CRITICAL postgres:16-alpine
        trivy image --severity HIGH,CRITICAL nginx:alpine
      continue-on-error: true

    - name: Upload Trivy report
      uses: actions/upload-artifact@v3
      with:
        name: trivy-report-${{ matrix.node-version }}
        path: trivy-prod-${{ matrix.node-version }}.json
        retention-days: 30
