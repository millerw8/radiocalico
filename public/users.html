<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Calico - User Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #D8F2D5;
            min-height: 100vh;
            padding: 0;
            color: #231F20;
        }

        .page-header {
            background: #38A29D;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 60px;
            height: 60px;
        }

        .site-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: #FFFFFF;
            margin: 0;
        }

        .nav-link {
            color: #FFFFFF;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 32px;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #1F4E23;
            margin-bottom: 16px;
            font-size: 2.25rem;
            line-height: 1.3;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #1F4E23;
            font-size: 1.5rem;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .subtitle {
            color: #231F20;
            margin-bottom: 24px;
            font-size: 0.875rem;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #231F20;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #CCC;
            border-radius: 4px;
            font-size: 16px;
            font-family: 'Open Sans', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #38A29D;
            box-shadow: 0 0 0 3px rgba(56, 162, 157, 0.3);
        }

        button {
            width: 100%;
            padding: 12px 24px;
            background: #1F4E23;
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background: #38A29D;
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #D8F2D5;
            color: #1F4E23;
            border: 1px solid #1F4E23;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .users-section {
            margin-top: 24px;
        }

        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            padding: 16px;
            background: #F5EADA;
            border-radius: 4px;
            margin-bottom: 12px;
            border-left: 3px solid #38A29D;
        }

        .user-item strong {
            color: #1F4E23;
            font-size: 1rem;
        }

        .user-item small {
            color: #666;
            display: block;
            margin-top: 4px;
            font-size: 0.875rem;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="header-left">
            <img src="/logo.png" alt="Radio Calico Logo" class="logo">
            <h1 class="site-title">Radio Calico</h1>
        </div>
        <a href="/" class="nav-link">← Back to Player</a>
    </header>

    <div class="main-content">
        <div class="card">
            <h1>User Management</h1>
            <p class="subtitle">Add and manage listener accounts</p>

            <form id="userForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        placeholder="Enter username"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="Enter email address"
                        autocomplete="off"
                    >
                </div>

                <button type="submit" id="submitBtn">Add User</button>
            </form>

            <div id="message" class="message"></div>
        </div>

        <div class="card">
            <h2>Existing Users</h2>
            <div id="userList" class="user-list">
                <div class="loading">Loading users...</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('userForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const userList = document.getElementById('userList');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        async function loadUsersList() {
            try {
                const response = await fetch('/users');
                const users = await response.json();

                if (users.length === 0) {
                    userList.innerHTML = '<div class="loading">No users yet</div>';
                } else {
                    userList.innerHTML = users.map(user => `
                        <div class="user-item">
                            <strong>${user.username}</strong>
                            <small>${user.email}</small>
                        </div>
                    `).join('');
                }
            } catch (error) {
                userList.innerHTML = '<div class="loading">Failed to load users</div>';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!username || !email) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Adding...';

            try {
                const response = await fetch('/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`User "${username}" added successfully!`, 'success');
                    form.reset();
                    loadUsersList();
                } else {
                    showMessage(data.error || 'Failed to add user', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add User';
            }
        });

        loadUsersList();
    </script>
</body>
</html>
